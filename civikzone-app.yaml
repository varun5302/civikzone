apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: civikzone
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/varun5302/civikzone.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: civikzone
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
