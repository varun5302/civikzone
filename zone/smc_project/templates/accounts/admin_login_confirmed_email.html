<!DOCTYPE html>
<html>
<head>
    <title>Login Confirmed</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7fb;
            font-family: Arial, sans-serif;
            color: #2c3e50;
        }

        .card {
            max-width: 460px;
            width: 92%;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
            padding: 24px;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.4rem;
            color: #1f7a3f;
        }

        p {
            margin: 0;
            line-height: 1.5;
            color: #4f5d6b;
            font-size: 0.96rem;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.88rem;
            color: #6a7785;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login Confirmed</h1>
        <p>Email verification complete.</p>
        <p class="hint">Return to the project tab. The dashboard opens there automatically.</p>
    </div>

    <script>
        (function () {
            if (window.history.length > 1) {
                window.setTimeout(function () {
                    try {
                        window.history.back();
                    } catch (error) {
                        console.warn('Unable to navigate back.', error);
                    }
                }, 1200);
            }
        })();
    </script>
</body>
</html>
