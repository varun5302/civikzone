<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Zone Officer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f6f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .forgot-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-container i {
            font-size: 3rem;
            color: #3498db;
        }
        .logo-text {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .logo-text .civic { color: #2c3e50; }
        .logo-text .zone { color: #3498db; }
        .logo-text .solution { color: #e74c3c; }
        .form-control {
            padding: 0.75rem;
        }
        .btn-submit {
            background-color: #2c3e50;
            color: white;
            padding: 0.75rem;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #34495e;
            color: white;
        }
        .back-link {
            text-align: center;
            margin-top: 1rem;
        }
        .back-link a {
            color: #3498db;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="logo-container">
            <i class="fas fa-city"></i>
            <div class="logo-text">
                <span class="civic">Civic</span>
                <span class="zone">Zone</span>
                <span class="solution">Solution</span>
            </div>
            <h5 class="mt-2">Zone Officer Password Reset</h5>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your registered email address" required>
            </div>
            <button type="submit" class="btn btn-submit">Send Reset Link</button>
        </form>
        
        <div class="back-link">
            <a href="{% url 'admin_login' %}">Back to Login</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
