<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - CivicZoneSolution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f6f6f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-container i {
            font-size: 3rem;
            color: #3498db;
        }
        .logo-text {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .logo-text .civic { color: #2c3e50; }
        .logo-text .zone { color: #3498db; }
        .logo-text .solution { color: #e74c3c; }
        .form-control {
            padding: 0.75rem;
        }
        .btn-login {
            background-color: #2c3e50;
            color: white;
            padding: 0.75rem;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #34495e;
            color: white;
        }
        .password-toggle-btn {
            position: absolute;
            top: 50%;
            right: 0.55rem;
            transform: translateY(-50%);
            border: 0;
            color: #495057;
            background: transparent;
            width: 2rem;
            height: 2rem;
            padding: 0;
            margin: 0;
            line-height: 1;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            box-shadow: none;
            outline: none;
        }
        .password-toggle-btn:hover,
        .password-toggle-btn:focus,
        .password-toggle-btn:active {
            transform: translateY(-50%);
            color: #212529;
            box-shadow: none;
            outline: none;
        }
        .password-mask {
            -webkit-text-security: disc;
            text-security: disc;
        }
        .password-wrapper {
            position: relative;
        }
        .password-floating {
            position: relative;
        }
        .password-floating .password-input {
            padding-right: 3rem;
        }
        .password-wrapper .password-input {
            padding-left: 2.4rem;
            padding-right: 3rem;
        }
        .password-prefix-icon {
            position: absolute;
            top: 50%;
            left: 0.9rem;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 2;
            pointer-events: none;
        }
        .quick-links {
            margin-top: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .quick-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.72rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.25s ease;
        }
        .quick-link.forgot-link {
            color: #0b5ed7;
            background: #eef4ff;
            border: 1px solid #cfe2ff;
        }
        .quick-link.forgot-link:hover {
            color: #0a58ca;
            background: #deebff;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(11, 94, 215, 0.18);
            
        }
        .quick-link.back-user-link {
            color: #2c3e50;
            background: #f1f3f5;
            border: 1px solid #dee2e6;
        }
        .quick-link.back-user-link:hover {
            color: #1f2d3a;
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(44, 62, 80, 0.15);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-container">
            <i class="fas fa-city"></i>
            <div class="logo-text">
                <span class="civic">Civic</span>
                <span class="zone">Zone</span>
                <span class="solution">Solution</span>
            </div>
            <h5 class="mt-2">Admin Portal</h5>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="adminUsername" placeholder="Username" autocomplete="username" required>
                <label for="adminUsername" class="form-label">Username</label>
            </div>
            <div class="form-floating password-floating mb-3">
                <input type="text" name="password" id="adminPassword" class="form-control password-input password-mask" placeholder="Password" autocomplete="off" required>
                <label for="adminPassword" class="form-label">Password</label>
                <button class="btn password-toggle-btn" type="button" id="toggleAdminPassword" aria-label="Show password">
                    <i class="fas fa-eye" id="toggleAdminPasswordIcon"></i>
                </button>
            </div>
            <button type="submit" class="btn btn-login">Login as Admin/Officer</button>
        </form>
        
        <div class="quick-links">
            <a href="{% url 'admin_forgot_password' %}" class="quick-link forgot-link">
                Forgot Password?
            </a>
            <a href="{% url 'login' %}" class="quick-link back-user-link">
                Back to User Login
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('adminPassword');
            const toggleBtn = document.getElementById('toggleAdminPassword');
            const toggleIcon = document.getElementById('toggleAdminPasswordIcon');

            toggleBtn.addEventListener('click', function() {
                const isMasked = passwordInput.classList.contains('password-mask');
                passwordInput.classList.toggle('password-mask', !isMasked);
                toggleIcon.classList.toggle('fa-eye', isMasked);
                toggleIcon.classList.toggle('fa-eye-slash', !isMasked);
                toggleBtn.setAttribute('aria-label', isMasked ? 'Hide password' : 'Show password');
            });
        });
    </script>
</body>
</html>
